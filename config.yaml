P0_RM1:
  name: TMM
  offset: 37.162 #40    # mm
  pitch: 0.25   #mm
  nstrips: 360    #mm
  MinStripsInCluster: 5 #if less than two cannot fit
  MaxStripsInCluster: 9999    # not a useful cut
  MinClusterCharge: 100   # ADC counts
  MinStripCharge: 60    # ADC counts
  MaxNConsecutiveHolesInCluster : 1
  MaskedStrips:
    - -1

P2_M01:
  name: ExMe
  offset: 212.774 #224   # mm
  gap: 50.128   # mm
  pitch: 0.4   #mm
  nstrips: 1024
  MinStripsInCluster: 8 #if less than two cannot fit    
  MaxStripsInCluster: 9999    # not a useful cut
  MinClusterCharge: 100  # ADC counts
  MinStripCharge: 60    # ADC counts
  MaxNConsecutiveHolesInCluster : 1
  EFF_WINDOW: 20
  MaskedStrips: 
    - -1

general:
  verbose : True
  NMAXEVENTS : 0.5 # fraction of events to process
  show_tracks : True # for debug purpose, show the fits on each cluster
  do_time_fit: False  # compute the strip time with fermi-dirac fit (slow, use with care!)
  plot_apv_signals: False # for debug purposes, show the fit on raw apv signals

paths:
  raw_dir: TestBeamMMTPC/raw/    # directory to apv raw files
  plots_dir:  debugefficiencyerror/plots/    # directory to save plots
  histo_dir: debugefficiencyerror/histos/   # directory to save histograms

units:
  length: mm
  time: ns
  speed: mm/ns
  charge : ADC Counts

gas:
  name: ArCF4Iso
  composition: (88:10:2)
  drift_speed: 0.105    # mm/ns

visualization:
  ExMeColor = 

apv:
  nbins: 27
  bin_width: 25   #ns
  charge_error: 1   #to be checked




  